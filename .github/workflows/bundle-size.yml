name: Bundle size badge

on:
  push:
    branches: [fix/bug-fixes]

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Measure bundle size (gzip)
        id: size
        run: |
          BYTES=$(gzip -9 -c dist/Sandbox.min.js | wc -c)
          echo "bytes=$BYTES" >> $GITHUB_OUTPUT

      - name: Format size
        id: fmt
        run: |
          python3 -c "
          b = ${{ steps.size.outputs.bytes }}
          if b >= 1024*1024:
              s = f'{b/1024/1024:.1f} MB'
          elif b >= 1024:
              s = f'{b/1024:.1f} kB'
          else:
              s = f'{b} B'
          print('size=' + s)
          " >> $GITHUB_OUTPUT

      - name: Update Gist badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: YOUR_GIST_ID_HERE
          filename: bundle-size.json
          label: bundle (gzip)
          message: ${{ steps.fmt.outputs.size }}
          color: blue